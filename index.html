<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#FF6B35"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Baani CRM"/>
<link rel="manifest" href="manifest.json"/>
<title>Baani Arts CRM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0F1E;--surface:#131929;--surface2:#1C2638;--surface3:#243044;
  --border:#2A3A52;--border2:#334155;
  --orange:#FF6B35;--orange2:#FF4500;
  --green:#10B981;--blue:#3B82F6;--purple:#8B5CF6;
  --yellow:#F59E0B;--red:#EF4444;--pink:#EC4899;
  --text:#F1F5F9;--text2:#94A3B8;--text3:#64748B;
  --radius:14px;--radius-sm:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
input,select,textarea{font-family:inherit;color:var(--text);background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 13px;font-size:14px;outline:none;width:100%;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--orange)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:72px}
button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--radius-sm);font-weight:600;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;padding:11px 20px;font-size:14px}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{background:var(--surface3);color:var(--text);padding:11px 20px;font-size:14px}
.btn-danger{background:rgba(239,68,68,.12);border:1.5px solid var(--red);color:var(--red);padding:9px 16px;font-size:13px}
.btn-wa{background:rgba(37,211,102,.1);border:1.5px solid #25D366;color:#25D366;padding:9px 16px;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn-print{background:rgba(59,130,246,.12);border:1.5px solid var(--blue);color:var(--blue);padding:9px 16px;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn-share{background:rgba(139,92,246,.12);border:1.5px solid var(--purple);color:var(--purple);padding:9px 16px;font-size:13px;display:inline-flex;align-items:center;gap:6px}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;height:100%;background:radial-gradient(ellipse at 60% 20%,rgba(255,107,53,.12) 0%,transparent 60%),var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:400px;margin:16px}
.login-icon{font-size:52px;display:block;text-align:center;margin-bottom:10px}
.login-title{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--orange),#FF9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.login-sub{font-size:13px;color:var(--text3);margin-top:4px;text-align:center}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px}
.login-btn{width:100%;padding:14px;font-size:15px;font-weight:800;margin-top:8px}
.login-hint{margin-top:16px;background:var(--bg);border-radius:10px;padding:12px;font-size:12px;color:var(--text3);line-height:1.8}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:8px;min-height:20px}

/* HEADER */
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50}
.header-logo{font-size:17px;font-weight:800;color:var(--orange)}
.logout-btn{background:var(--surface3);color:var(--text2);padding:6px 12px;font-size:12px;border-radius:8px}

/* NAV */
#nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;padding:0 8px}
#nav::-webkit-scrollbar{display:none}
.nav-btn{background:transparent;color:var(--text3);border-bottom:3px solid transparent;border-radius:0;padding:12px 14px;font-size:12px;font-weight:700;white-space:nowrap}
.nav-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
.nav-badge{background:var(--red);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;margin-left:4px;font-weight:800}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:16px}
.page{display:none}.page.active{display:block}
.sec-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:600px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.stat-grid{grid-template-columns:repeat(5,1fr)}}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:14px 16px;border-left:4px solid var(--border)}
.stat-num{font-size:26px;font-weight:800;line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* CARD */
.card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card:last-child{margin-bottom:0}

/* PIPELINE */
.pipeline-wrap{overflow-x:auto;padding-bottom:12px;margin:0 -16px;padding-left:16px}
.pipeline-row{display:flex;gap:10px;min-width:max-content;padding-right:16px}
.pipeline-col{width:190px;flex-shrink:0}
.pipeline-head{border-radius:10px 10px 0 0;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.pipeline-head-label{font-size:11px;font-weight:800;color:var(--text)}
.pipeline-count{font-size:10px;background:var(--bg);border-radius:20px;padding:2px 7px;color:var(--text3);font-weight:700}
.pipeline-body{background:var(--bg);border-radius:0 0 10px 10px;padding:8px;min-height:80px}
.p-card{background:var(--surface);border-radius:9px;padding:11px;margin-bottom:7px;cursor:pointer;border:1px solid var(--border);transition:border-color .2s}
.p-card:hover{border-color:var(--border2)}
.p-name{font-size:12px;font-weight:700;margin-bottom:3px}
.p-meta{font-size:11px;color:var(--text3);margin-bottom:2px}
.p-empty{font-size:11px;color:var(--text3);text-align:center;padding:16px 0}

/* BADGE */
.badge{display:inline-block;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;margin:2px 2px 0 0}
.badge-overdue{background:rgba(239,68,68,.15);color:var(--red)}
.badge-today{background:rgba(245,158,11,.15);color:var(--yellow)}
.repeat-tag{background:rgba(139,92,246,.15);color:var(--purple);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}
.loc-tag{background:rgba(16,185,129,.12);color:var(--green);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}

/* LEAD LIST */
.lead-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;cursor:pointer}
.lead-row-info{flex:1;min-width:0}
.lead-name-big{font-size:15px;font-weight:700}
.lead-meta-row{font-size:12px;color:var(--text3);margin-top:3px}
.lead-badges{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.lead-row-right{text-align:right;font-size:11px;color:var(--text3);flex-shrink:0}

/* FOLLOWUP */
.fu-card{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.fu-info{flex:1;cursor:pointer;min-width:0}
.fu-name{font-size:14px;font-weight:700;margin-bottom:3px}
.fu-meta{font-size:12px;color:var(--text3)}
.fu-section-title{font-size:12px;font-weight:800;margin-bottom:10px;padding:6px 10px;border-radius:8px}

/* SEARCH & FILTER */
.search-bar{margin-bottom:12px;position:relative}
.search-bar input{padding-left:36px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-row select{width:auto;flex:1;min-width:120px;font-size:13px;padding:8px 10px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:600px){.modal-overlay{align-items:center;padding:16px}}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);width:100%;max-width:600px;max-height:94vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:24px 18px 32px}
@media(min-width:600px){.modal-box{border-radius:20px;padding:28px}}
.modal-title{font-size:17px;font-weight:800;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:var(--surface3);color:var(--text2);width:32px;height:32px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center}

/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg-full{grid-column:1/-1}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}

/* LOCATIONS */
.loc-block{background:var(--bg);border-radius:10px;padding:14px;margin-top:10px;border:1.5px solid var(--border2)}
.loc-block-title{font-size:12px;font-weight:800;color:var(--text2);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

/* ITEMS */
.item-row-form{display:grid;grid-template-columns:3fr 1fr 40px;gap:6px;align-items:center;margin-bottom:7px}
.item-rm{background:rgba(239,68,68,.12);color:var(--red);border:none;border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;flex-shrink:0}

/* PAYMENT */
.pay-summary{background:var(--bg);border-radius:10px;padding:12px;margin-top:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
.pay-num{font-size:16px;font-weight:800}
.pay-lbl{font-size:10px;color:var(--text3);margin-top:2px}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:8px}
.photo-thumb{aspect-ratio:1;border-radius:8px;object-fit:cover;width:100%;cursor:pointer;border:1.5px solid var(--border)}
.photo-add{aspect-ratio:1;border-radius:8px;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;color:var(--text3);background:var(--bg)}
.photo-add:hover{border-color:var(--orange);color:var(--orange)}

/* PRINT OVERLAY */
.print-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;padding:12px}
.print-overlay.open{display:flex}
.print-box{background:#fff;width:100%;max-width:720px;max-height:94vh;border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.print-toolbar{background:#1E293B;padding:12px 16px;display:flex;gap:8px;justify-content:space-between;align-items:center;flex-wrap:wrap;flex-shrink:0}
.print-toolbar-title{color:#fff;font-size:14px;font-weight:700}
.print-content-area{flex:1;overflow-y:auto}

/* LEAD PRINT STYLES */
.lead-print{padding:28px;font-family:Inter,-apple-system,sans-serif;color:#0F172A;font-size:13px}
.lp-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:16px;border-bottom:3px solid #FF6B35;margin-bottom:18px}
.lp-brand{font-size:20px;font-weight:900;color:#FF6B35}
.lp-brand-sub{font-size:11px;color:#64748B;margin-top:3px;line-height:1.6}
.lp-badge{background:#FF6B35;color:#fff;padding:5px 14px;border-radius:6px;font-size:12px;font-weight:800}
.lp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.lp-box{background:#F8FAFC;border-radius:8px;padding:12px}
.lp-box-title{font-size:10px;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.lp-box-val{font-size:14px;font-weight:700;color:#0F172A}
.lp-box-sub{font-size:12px;color:#475569;margin-top:3px;line-height:1.6}
.lp-section{margin-bottom:16px}
.lp-section-title{font-size:11px;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #E2E8F0}
.lp-loc-card{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;padding:12px;margin-bottom:8px}
.lp-loc-title{font-size:12px;font-weight:800;color:#059669;margin-bottom:6px}
.lp-item-table{width:100%;border-collapse:collapse;font-size:12px}
.lp-item-table th{background:#FF6B35;color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.lp-item-table td{padding:7px 10px;border-bottom:1px solid #E2E8F0}
.lp-item-table tr:nth-child(even) td{background:#F8FAFC}
.lp-total-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:#475569}
.lp-total-row.grand{font-size:16px;font-weight:800;color:#0F172A;border-top:2px solid #E2E8F0;margin-top:6px;padding-top:8px}
.lp-notes{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:12px;font-size:12px;color:#92400E;line-height:1.7}
.lp-footer{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;padding-top:14px;border-top:1px solid #E2E8F0}
.lp-sign-area{text-align:right}
.lp-sign-line{border-top:1px solid #CBD5E1;margin-top:40px;padding-top:6px;font-size:11px;color:#94A3B8}

/* IMG VIEWER */
.img-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;align-items:center;justify-content:center}
.img-viewer.open{display:flex}
.img-viewer img{max-width:90vw;max-height:90vh;border-radius:10px;object-fit:contain}
.img-viewer-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface3);color:var(--text);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}

.share-box{background:var(--bg);border-radius:10px;padding:12px;margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.share-link-txt{font-size:12px;color:var(--blue);word-break:break-all;flex:1}

/* CHART */
.chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chart-bar-label{font-size:12px;color:var(--text2);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-bar-track{flex:1;background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px}
.chart-bar-val{font-size:11px;color:var(--text3);width:24px;text-align:right;flex-shrink:0}

.month-table{width:100%;border-collapse:collapse;font-size:13px}
.month-table th{color:var(--text3);font-size:11px;text-transform:uppercase;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
.month-table td{padding:8px;border-bottom:1px solid var(--border);color:var(--text2)}
.month-table td:first-child{color:var(--text);font-weight:600}

@supports(padding-bottom:env(safe-area-inset-bottom)){
  #content{padding-bottom:calc(16px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <span class="login-icon">🪧</span>
    <div class="login-title">Baani Arts CRM</div>
    <div class="login-sub">Sign Board Business Manager</div>
    <div style="margin:24px 0 14px">
      <label class="lbl">Email</label>
      <input type="email" id="l-email" placeholder="admin@baaniarts.in"/>
    </div>
    <div style="margin-bottom:4px">
      <label class="lbl">Password</label>
      <input type="password" id="l-pass" placeholder="••••••••"/>
    </div>
    <div class="login-err" id="l-err"></div>
    <button class="btn-primary login-btn" onclick="doLogin()">Login →</button>
    <div class="login-hint"><strong style="color:var(--text2)">Default Login:</strong><br/>Email: admin@baaniarts.in<br/>Password: baani2024</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none;flex:1;flex-direction:column;height:100%;overflow:hidden">
  <div id="header">
    <div class="header-logo">🪧 Baani Arts CRM</div>
    <div id="sync-status" style="font-size:11px;color:var(--text3)"></div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;color:var(--text3)" id="hdr-user"></span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div id="nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="goTab('dashboard')">📈 Dashboard</button>
    <button class="nav-btn" data-tab="pipeline" onclick="goTab('pipeline')">📊 Pipeline</button>
    <button class="nav-btn" data-tab="followups" onclick="goTab('followups')">🔔 Follow-ups <span class="nav-badge" id="fu-badge" style="display:none"></span></button>
    <button class="nav-btn" data-tab="leads" onclick="goTab('leads')">📋 All Leads</button>
    <button class="nav-btn" data-tab="reports" onclick="goTab('reports')">📈 Reports</button>
  </div>
  <div id="content">
    <div class="page active" id="page-dashboard"></div>
    <div class="page" id="page-pipeline"></div>
    <div class="page" id="page-followups"></div>
    <div class="page" id="page-leads"></div>
    <div class="page" id="page-reports"></div>
  </div>
</div>
</div>

<!-- LEAD MODAL -->
<div class="modal-overlay" id="lead-modal">
<div class="modal-box">
  <div class="modal-title">
    <span id="modal-title-text">➕ Naya Lead</span>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="fg" id="modal-form"></div>
  <div id="modal-locations"></div>
  <div id="modal-items"></div>
  <div id="modal-photos"></div>
  <div id="modal-payment"></div>
  <div id="modal-share"></div>
  <div class="btn-row" id="modal-btns"></div>
</div>
</div>

<!-- PRINT OVERLAY -->
<div class="print-overlay" id="print-overlay">
<div class="print-box">
  <div class="print-toolbar">
    <div class="print-toolbar-title" id="print-title">Lead Details</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-wa" style="padding:7px 13px;font-size:12px" onclick="shareWA()">💬 WhatsApp</button>
      <button style="background:rgba(59,130,246,.2);border:1px solid #3B82F6;color:#93C5FD;padding:7px 13px;font-size:12px;border-radius:8px;font-weight:600" onclick="copyText()">📋 Copy Text</button>
      <button style="background:rgba(16,185,129,.2);border:1px solid #10B981;color:#6EE7B7;padding:7px 13px;font-size:12px;border-radius:8px;font-weight:600" onclick="doPrint()">🖨️ Print</button>
      <button style="background:rgba(245,158,11,.2);border:1px solid #F59E0B;color:#FCD34D;padding:7px 13px;font-size:12px;border-radius:8px;font-weight:600" onclick="savePDF()">📥 PDF</button>
      <button style="background:var(--surface3);color:var(--text2);padding:7px 13px;font-size:12px;border-radius:8px;font-weight:600" onclick="closePrint()">✕</button>
    </div>
  </div>
  <div class="print-content-area" id="print-content"></div>
</div>
</div>

<!-- IMG VIEWER -->
<div class="img-viewer" id="img-viewer" onclick="closeImg()">
  <button class="img-viewer-close" onclick="closeImg()">✕</button>
  <img id="img-src" src="" alt=""/>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const STAGES=[
  {id:'new_call',label:'📞 New Call',color:'#3B82F6'},
  {id:'quotation',label:'📄 Quotation Sent',color:'#8B5CF6'},
  {id:'followup',label:'🔄 Follow-up',color:'#F59E0B'},
  {id:'site_visit',label:'📍 Site Visit',color:'#EC4899'},
  {id:'confirmed',label:'✅ Order Confirmed',color:'#10B981'},
  {id:'production',label:'⚙️ In Production',color:'#6366F1'},

        <button class="btn-print" style="padding:7px 12px;font-size:12px" onclick="openPrint('${l.id}')">🖨️</button>

  let html='<div class="sec-title">🔔 Follow-ups</div>';

// ── REPORTS ───────────────────────────────────────────────────────────────────
function renderReports(){
  const monthly={};
  leads.forEach(l=>{
    const m=getMonthYear(l.createdAt);
    if(!monthly[m])monthly[m]={leads:0,delivered:0,revenue:0,pipeline:0};
    monthly[m].leads++;
    if(l.stage==='delivered'){monthly[m].delivered++;monthly[m].revenue+=(Number(l.quoteAmount)||0);}
    else monthly[m].pipeline+=(Number(l.quoteAmount)||0);
  });
  const months=Object.entries(monthly).reverse();
  const stageCnt=STAGES.map(s=>({...s,cnt:leads.filter(l=>l.stage===s.id).length}));
  const maxStg=Math.max(...stageCnt.map(s=>s.cnt),1);

  document.getElementById('page-reports').innerHTML=`
    <div class="sec-title">📈 Monthly Reports</div>
    ${months.length===0?'<div class="empty-state"><div class="empty-icon">📊</div><div>Abhi koi data nahi</div></div>':''}
    ${months.length>0?`<div class="card" style="overflow-x:auto"><table class="month-table">
      <tr><th>Month</th><th>Leads</th><th>Delivered</th><th>Revenue</th><th>Pipeline</th></tr>
      ${months.map(([m,d])=>`<tr><td>${m}</td><td>${d.leads}</td><td>${d.delivered}</td>
        <td style="color:var(--green)">${fmtMoney(d.revenue)}</td>
        <td style="color:var(--purple)">${fmtMoney(d.pipeline)}</td></tr>`).join('')}
    </table></div>`:''}
    <div class="sec-title" style="margin-top:20px">🔽 Stage Funnel</div>
    <div class="card">${stageCnt.map(s=>`
      <div class="chart-bar-row">
        <div class="chart-bar-label">${s.label}</div>
        <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.round(s.cnt/maxStg*100)}%;background:${s.color}"></div></div>
        <div class="chart-bar-val">${s.cnt}</div>
      </div>`).join('')}
    </div>`;
}

    <div class="fg">
      <div><label class="lbl">Location Name / Branch</label>
        <input value="${esc(lc.name||'')}" oninput="editLocs[${i}].name=this.value" placeholder="Head Office, Branch 2, Shop..."/></div>
      <div><label class="lbl">Board Type (Is Location Ka)</label>

        <input value="${esc(lc.address||'')}" oninput="editLocs[${i}].address=this.value" placeholder="Shop 12, Laxmi Nagar, Delhi..."/></div>
      <div><label class="lbl">Size (e.g. 4x2 ft)</label>
        <input value="${esc(lc.size||'')}" oninput="editLocs[${i}].size=this.value" placeholder="4 x 2 ft"/></div>

function renderPhotos(photos){
  editPhotos=[...photos];
  document.getElementById('modal-photos').innerHTML=`
    <div style="margin-top:14px"><label class="lbl">📸 Photos (Site Visit / Design)</label>
      <div class="photo-grid" id="photo-grid">

      </div>
      <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)"/>

function handlePhotos(input){
  [...input.files].forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{editPhotos.push(e.target.result);renderPhotos(editPhotos);}
    r.readAsDataURL(f);
  });
}

// ── SAVE / DELETE ─────────────────────────────────────────────────────────────
function saveLead(){
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  if(!name){showToast('❌ Naam daalna zaroori hai!');return;}
  if(!phone){showToast('❌ Phone number daalna zaroori hai!');return;}
  const now=new Date().toISOString();
  const existing=editingId?leads.find(l=>l.id===editingId):null;
  const lead={
    id:editingId||uid(),
    name,phone,
    company:document.getElementById('f-company').value,
    source:document.getElementById('f-source').value,
    boardType:document.getElementById('f-board').value,
    stage:document.getElementById('f-stage').value,
    quoteAmount:document.getElementById('f-quote').value,
    advancePaid:document.getElementById('f-advance').value,
    balanceDue:document.getElementById('f-balance').value,
    followUpDate:document.getElementById('f-fudate').value,
    address:document.getElementById('f-addr').value,
    notes:document.getElementById('f-notes').value,
    items:editItems.filter(it=>it.desc||it.amount),
    photos:editPhotos,
    locations:editLocs.filter(lc=>lc.address||lc.name!==`Location ${editLocs.indexOf(lc)+1}`),
    createdAt:existing?existing.createdAt:now,
    updatedAt:now,
  };
  if(editingId)leads=leads.map(l=>l.id===editingId?lead:l);
  else leads=[lead,...leads];
  saveSt('ba_crm_leads',leads);
  closeModal();updateBadge();renderTab(currentTab);
  showToast(editingId?'✅ Lead update ho gayi!':'✅ Naya lead save ho gaya!');
}

function deleteLead(id){
  if(!confirm('Yeh lead delete karein?'))return;
  leads=leads.filter(l=>l.id!==id);
  saveSt('ba_crm_leads',leads);
  closeModal();closePrint();updateBadge();renderTab(currentTab);
  showToast('🗑️ Lead delete ho gayi');
}

// ── GOOGLE SHEETS SYNC ───────────────────────────────────────────────────────
async function manualSync() {
  showToast('☁️ Google Sheet se sync ho raha hai...');
  const ok = await syncFromSheet();
  if(ok){ renderTab(currentTab); showToast('✅ Data sync ho gaya! Sab devices update!'); }
  else { showToast('⚠️ Internet check karo — sync nahi hua'); }
}

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz3Mbe4s2Wax5CbgMyNck1k_Etqf7dS74YkEQWzISj6qPgmbBr05rKXAmcMNZGoUd1f/exec';
let syncStatus = 'idle'; // idle, syncing, ok, error

async function syncFromSheet() {
  try {
    setSyncUI('syncing');
    const res = await fetch(SHEET_URL + '?action=getAll&t=' + Date.now(), {mode:'cors', cache:'no-store'});
    const data = await res.json();
    if(data.status === 'ok' && data.leads) {
      // Sheet is single source of truth
      // Local leads jo sheet mein nahi hain — unhe bhi sheet mein push karo
      const sheetIds = new Set(data.leads.map(l=>String(l.id)));
      const localOnly = leads.filter(l=>!sheetIds.has(String(l.id)));
      
      // Local-only leads ko sheet mein save karo
      for(const lead of localOnly) {
        await syncToSheet(lead, false);
      }
      
      // Ab fresh data lo
      if(localOnly.length > 0) {
        const res2 = await fetch(SHEET_URL + '?action=getAll&t=' + Date.now(), {mode:'cors', cache:'no-store'});
        const data2 = await res2.json();
        if(data2.status === 'ok') {
          leads = data2.leads;
        }
      } else {
        leads = data.leads;
      }
      
      // Deduplicate by id (latest updatedAt wins)
      const seen = {};
      leads = leads.filter(l => {
        const id = String(l.id);
        if(!seen[id]) { seen[id] = true; return true; }
        return false;
      });
      
      saveSt('ba_crm_leads', leads);
      setSyncUI('ok');
      return true;
    }
  } catch(e) {
    console.error('Sync error:', e);
    setSyncUI('error');
  }
  return false;
}

async function syncToSheet(lead, isDelete) {
  try {
    const action = isDelete ? 'delete' : 'save';
    const params = isDelete
      ? `action=delete&id=${lead.id}&t=${Date.now()}`
      : `action=save&data=${encodeURIComponent(JSON.stringify(lead))}&t=${Date.now()}`;
    const res = await fetch(SHEET_URL + '?' + params, {mode:'cors', cache:'no-store'});
    const result = await res.json();
    return result;
  } catch(e) {
    console.log('Sync error:', e);
    return {status:'error'};
  }
}

function setSyncUI(status) {
  syncStatus = status;
  const el = document.getElementById('sync-status');
  if(!el) return;
  if(status==='syncing') el.innerHTML = '<span style="color:#F59E0B">⟳ Syncing...</span>';
  else if(status==='ok') el.innerHTML = '<span style="color:#10B981">✅ Synced</span>';
  else if(status==='error') el.innerHTML = '<span style="color:#EF4444">⚠️ Offline</span>';
  else el.innerHTML = '';
}

// Override saveLead to also sync
const _origSaveLead = saveLead;
async function saveLead() {
  // Save locally first
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  if(!name){showToast('❌ Naam daalna zaroori hai!');return;}
  if(!phone){showToast('❌ Phone number daalna zaroori hai!');return;}
  const now=new Date().toISOString();
  const existing=editingId?leads.find(l=>l.id===editingId):null;
  const lead={
    id:editingId||uid(),
    name,phone,
    company:document.getElementById('f-company').value,
    source:document.getElementById('f-source').value,
    boardType:document.getElementById('f-board').value,
    stage:document.getElementById('f-stage').value,
    quoteAmount:document.getElementById('f-quote').value,
    advancePaid:document.getElementById('f-advance').value,
    balanceDue:document.getElementById('f-balance').value,
    followUpDate:document.getElementById('f-fudate').value,
    address:document.getElementById('f-addr').value,
    notes:document.getElementById('f-notes').value,
    items:editItems.filter(it=>it.desc||it.amount),
    photos:editPhotos,
    locations:editLocs.filter(lc=>lc.address||lc.name!==`Location ${editLocs.indexOf(lc)+1}`),
    createdAt:existing?existing.createdAt:now,
    updatedAt:now,
  };
  if(editingId)leads=leads.map(l=>l.id===editingId?lead:l);
  else leads=[lead,...leads];
  saveSt('ba_crm_leads',leads);
  closeModal();updateBadge();renderTab(currentTab);
  showToast('💾 Saving...');
  setSyncUI('syncing');
  // Sync to sheet
  syncToSheet(lead, false).then(result => {
    if(result && result.status === 'ok') {
      showToast('☁️ Sab devices pe save ho gaya!');
      setSyncUI('ok');
    } else {
      showToast('⚠️ Local save hua, Sheet sync baad mein hoga');
      setSyncUI('error');
    }
  });
}

// Override deleteLead to also sync
const _origDeleteLead = deleteLead;
async function deleteLead(id) {
  if(!confirm('Yeh lead delete karein?'))return;
  const lead = leads.find(l=>l.id===id);
  leads=leads.filter(l=>l.id!==id);
  saveSt('ba_crm_leads',leads);
  closeModal();closePrint();updateBadge();renderTab(currentTab);
  showToast('🗑️ Delete ho gayi! Syncing...');
  if(lead) syncToSheet(lead, true).then(()=>setSyncUI('ok'));
}
