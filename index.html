<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#FF6B35"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Baani CRM"/>
<meta name="description" content="Baani Arts Sign Board CRM"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>Baani Arts CRM</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0A0F1E;--surface:#131929;--surface2:#1C2638;--surface3:#243044;
    --border:#2A3A52;--border2:#334155;
    --orange:#FF6B35;--orange2:#FF4500;--orange-glow:rgba(255,107,53,0.15);
    --green:#10B981;--blue:#3B82F6;--purple:#8B5CF6;
    --yellow:#F59E0B;--red:#EF4444;--pink:#EC4899;
    --text:#F1F5F9;--text2:#94A3B8;--text3:#64748B;
    --radius:14px;--radius-sm:10px;--radius-xs:7px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
  #app{height:100%;display:flex;flex-direction:column}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

  /* INPUT RESET */
  input,select,textarea{font-family:inherit;color:var(--text);background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 13px;font-size:14px;outline:none;width:100%;transition:border-color .2s}
  input:focus,select:focus,textarea:focus{border-color:var(--orange)}
  select option{background:var(--surface2)}
  textarea{resize:vertical;min-height:72px}

  /* BUTTONS */
  button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--radius-sm);font-weight:600;transition:all .15s}
  .btn-primary{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;padding:11px 20px;font-size:14px}
  .btn-primary:active{transform:scale(0.97)}
  .btn-secondary{background:var(--surface3);color:var(--text);padding:11px 20px;font-size:14px}
  .btn-danger{background:rgba(239,68,68,.12);border:1.5px solid var(--red);color:var(--red);padding:9px 16px;font-size:13px}
  .btn-wa{background:rgba(37,211,102,.1);border:1.5px solid #25D366;color:#25D366;padding:9px 16px;font-size:13px;display:inline-flex;align-items:center;gap:6px}
  .btn-icon{background:var(--surface3);color:var(--text2);padding:8px 12px;font-size:18px;border-radius:var(--radius-sm)}

  /* LOGIN */
  #login-screen{display:flex;align-items:center;justify-content:center;height:100%;background:radial-gradient(ellipse at 60% 20%,rgba(255,107,53,.12) 0%,transparent 60%),var(--bg)}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:400px;margin:16px}
  .login-logo{text-align:center;margin-bottom:32px}
  .login-icon{font-size:52px;display:block;margin-bottom:10px}
  .login-title{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--orange),#FF9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .login-sub{font-size:13px;color:var(--text3);margin-top:4px}
  .login-field{margin-bottom:16px}
  .login-label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
  .login-btn{width:100%;padding:14px;font-size:15px;font-weight:800;margin-top:8px;letter-spacing:.3px}
  .login-hint{margin-top:20px;background:var(--bg);border-radius:10px;padding:14px;font-size:12px;color:var(--text3);line-height:1.8}
  .login-hint strong{color:var(--text2)}
  .login-error{color:var(--red);font-size:13px;text-align:center;margin-top:8px;min-height:20px}

  /* HEADER */
  #header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:50}
  .header-logo{font-size:17px;font-weight:800;color:var(--orange);display:flex;align-items:center;gap:8px}
  .header-right{display:flex;align-items:center;gap:8px}
  .header-user{font-size:12px;color:var(--text3);display:none}
  @media(min-width:600px){.header-user{display:block}}
  .logout-btn{background:var(--surface3);color:var(--text2);padding:6px 12px;font-size:12px;border-radius:8px}

  /* NAV */
  #nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;padding:0 8px}
  #nav::-webkit-scrollbar{display:none}
  .nav-btn{background:transparent;color:var(--text3);border-bottom:3px solid transparent;border-radius:0;padding:12px 14px;font-size:12px;font-weight:700;white-space:nowrap;letter-spacing:.3px}
  .nav-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
  .nav-badge{background:var(--red);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;margin-left:4px;font-weight:800}

  /* CONTENT */
  #content{flex:1;overflow-y:auto;padding:16px}
  .page{display:none}
  .page.active{display:block}

  /* SECTION TITLE */
  .sec-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px}

  /* STAT GRID */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  @media(min-width:600px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:900px){.stat-grid{grid-template-columns:repeat(5,1fr)}}
  .stat-card{background:var(--surface);border-radius:var(--radius);padding:14px 16px;border-left:4px solid var(--border)}
  .stat-num{font-size:26px;font-weight:800;line-height:1}
  .stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

  /* CARD */
  .card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
  .card:last-child{margin-bottom:0}

  /* PIPELINE */
  .pipeline-wrap{overflow-x:auto;padding-bottom:12px;margin:0 -16px;padding-left:16px}
  .pipeline-row{display:flex;gap:10px;min-width:max-content;padding-right:16px}
  .pipeline-col{width:190px;flex-shrink:0}
  .pipeline-head{border-radius:10px 10px 0 0;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
  .pipeline-head-label{font-size:11px;font-weight:800;color:var(--text);letter-spacing:.3px}
  .pipeline-count{font-size:10px;background:var(--bg);border-radius:20px;padding:2px 7px;color:var(--text3);font-weight:700}
  .pipeline-body{background:var(--bg);border-radius:0 0 10px 10px;padding:8px;min-height:80px}
  .p-card{background:var(--surface);border-radius:9px;padding:11px;margin-bottom:7px;cursor:pointer;border:1px solid var(--border);transition:border-color .2s,transform .15s}
  .p-card:hover{border-color:var(--border2);transform:translateY(-1px)}
  .p-card:active{transform:scale(0.98)}
  .p-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px}
  .p-meta{font-size:11px;color:var(--text3);margin-bottom:2px}
  .p-empty{font-size:11px;color:var(--text3);text-align:center;padding:16px 0}

  /* BADGE */
  .badge{display:inline-block;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;margin:2px 2px 0 0}
  .badge-overdue{background:rgba(239,68,68,.15);color:var(--red)}
  .badge-today{background:rgba(245,158,11,.15);color:var(--yellow)}

  /* LEAD LIST CARD */
  .lead-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;cursor:pointer;transition:border-color .2s}
  .lead-row:hover{border-color:var(--border2)}
  .lead-row-info{flex:1;min-width:0}
  .lead-name-big{font-size:15px;font-weight:700}
  .lead-meta-row{font-size:12px;color:var(--text3);margin-top:3px}
  .lead-badges{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
  .lead-row-right{text-align:right;font-size:11px;color:var(--text3);flex-shrink:0}

  /* FOLLOWUP LIST */
  .fu-card{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .fu-info{flex:1;cursor:pointer;min-width:0}
  .fu-name{font-size:14px;font-weight:700;margin-bottom:3px}
  .fu-meta{font-size:12px;color:var(--text3)}
  .fu-section-title{font-size:12px;font-weight:800;margin-bottom:10px;padding:6px 10px;border-radius:8px}

  /* SEARCH */
  .search-bar{margin-bottom:12px;position:relative}
  .search-bar input{padding-left:36px}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}

  /* FILTER ROW */
  .filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .filter-row select{width:auto;flex:1;min-width:120px;font-size:13px;padding:8px 10px}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;padding:0}
  @media(min-width:600px){.modal-overlay{align-items:center;padding:16px}}
  .modal-overlay.open{display:flex}
  .modal-box{background:var(--surface);width:100%;max-width:580px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:24px 20px 32px}
  @media(min-width:600px){.modal-box{border-radius:20px;padding:28px}}
  .modal-title{font-size:17px;font-weight:800;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
  .modal-close{background:var(--surface3);color:var(--text2);width:32px;height:32px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

  /* FORM */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-full{grid-column:1/-1}
  .form-label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px}
  .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}

  /* ITEMS LIST (multiple boards) */
  .item-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .item-row input,.item-row select{flex:1}
  .item-row .remove-btn{background:rgba(239,68,68,.12);color:var(--red);border:none;border-radius:8px;padding:8px 10px;font-size:16px;cursor:pointer;flex-shrink:0}

  /* PHOTOS */
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:8px}
  .photo-thumb{aspect-ratio:1;border-radius:8px;object-fit:cover;width:100%;cursor:pointer;border:1.5px solid var(--border)}
  .photo-add{aspect-ratio:1;border-radius:8px;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;color:var(--text3);background:var(--bg);transition:border-color .2s}
  .photo-add:hover{border-color:var(--orange);color:var(--orange)}

  /* PAYMENT */
  .payment-summary{background:var(--bg);border-radius:10px;padding:12px;margin-top:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
  .pay-num{font-size:16px;font-weight:800}
  .pay-label{font-size:10px;color:var(--text3);margin-top:2px}

  /* SHARE LINK */
  .share-box{background:var(--bg);border-radius:10px;padding:12px;margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .share-link{font-size:12px;color:var(--blue);word-break:break-all;flex:1}

  /* DASHBOARD CHARTS */
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  @media(min-width:700px){.dash-grid{grid-template-columns:1fr 1fr 1fr}}
  .chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .chart-bar-label{font-size:12px;color:var(--text2);width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chart-bar-track{flex:1;background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
  .chart-bar-fill{height:100%;border-radius:4px;transition:width .5s}
  .chart-bar-val{font-size:11px;color:var(--text3);width:24px;text-align:right;flex-shrink:0}

  /* MONTHLY TABLE */
  .month-table{width:100%;border-collapse:collapse;font-size:13px}
  .month-table th{color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
  .month-table td{padding:8px;border-bottom:1px solid var(--border);color:var(--text2)}
  .month-table td:first-child{color:var(--text);font-weight:600}

  /* STATUS CHIP */
  .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}

  /* TOAST */
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface3);color:var(--text);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* IMAGE VIEWER */
  .img-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;align-items:center;justify-content:center}
  .img-viewer.open{display:flex}
  .img-viewer img{max-width:90vw;max-height:90vh;border-radius:10px;object-fit:contain}
  .img-viewer-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}

  /* EMPTY STATE */
  .empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
  .empty-icon{font-size:48px;margin-bottom:12px}
  .empty-text{font-size:14px}

  /* REPEAT CUSTOMER TAG */
  .repeat-tag{background:rgba(139,92,246,.15);color:var(--purple);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}

  /* MOBILE BOTTOM SAFE */
  @supports(padding-bottom:env(safe-area-inset-bottom)){
    #content{padding-bottom:calc(16px + env(safe-area-inset-bottom))}
  }
</style>
</head>
<body>
<div id="app">
  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">
        <span class="login-icon">🪧</span>
        <div class="login-title">Baani Arts CRM</div>
        <div class="login-sub">Sign Board Business Manager</div>
      </div>
      <div class="login-field">
        <label class="login-label">Email</label>
        <input type="email" id="login-email" placeholder="admin@baaniarts.in"/>
      </div>
      <div class="login-field">
        <label class="login-label">Password</label>
        <input type="password" id="login-pass" placeholder="••••••••"/>
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="btn-primary login-btn" onclick="doLogin()">Login →</button>
      <div class="login-hint">
        <strong>Default Login:</strong><br/>
        Email: admin@baaniarts.in<br/>
        Password: baani2024
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" style="display:none;flex:1;flex-direction:column;height:100%;overflow:hidden">
    <div id="header">
      <div class="header-logo">🪧 Baani Arts</div>
      <div class="header-right">
        <span class="header-user" id="header-user"></span>
        <button class="logout-btn" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <div id="nav">
      <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">📈 Dashboard</button>
      <button class="nav-btn" data-tab="pipeline" onclick="switchTab('pipeline')">📊 Pipeline</button>
      <button class="nav-btn" data-tab="followups" onclick="switchTab('followups')">🔔 Follow-ups <span class="nav-badge" id="fu-badge" style="display:none"></span></button>
      <button class="nav-btn" data-tab="leads" onclick="switchTab('leads')">📋 All Leads</button>
      <button class="nav-btn" data-tab="reports" onclick="switchTab('reports')">📈 Reports</button>
    </div>
    <div id="content">
      <div class="page active" id="page-dashboard"></div>
      <div class="page" id="page-pipeline"></div>
      <div class="page" id="page-followups"></div>
      <div class="page" id="page-leads"></div>
      <div class="page" id="page-reports"></div>
    </div>
  </div>
</div>

<!-- LEAD MODAL -->
<div class="modal-overlay" id="lead-modal">
  <div class="modal-box">
    <div class="modal-title">
      <span id="modal-title-text">➕ Naya Lead</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid" id="modal-form"></div>
    <div id="modal-items-section"></div>
    <div id="modal-photos-section"></div>
    <div id="modal-payment-section"></div>
    <div id="modal-share-section"></div>
    <div class="btn-row" id="modal-btn-row"></div>
  </div>
</div>

<!-- IMAGE VIEWER -->
<div class="img-viewer" id="img-viewer" onclick="closeImgViewer()">
  <button class="img-viewer-close" onclick="closeImgViewer()">✕</button>
  <img id="img-viewer-src" src="" alt=""/>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const STAGES=[
  {id:'new_call',label:'📞 New Call',color:'#3B82F6'},
  {id:'quotation',label:'📄 Quotation Sent',color:'#8B5CF6'},
  {id:'followup',label:'🔄 Follow-up',color:'#F59E0B'},
  {id:'site_visit',label:'📍 Site Visit',color:'#EC4899'},
  {id:'confirmed',label:'✅ Order Confirmed',color:'#10B981'},
  {id:'production',label:'⚙️ In Production',color:'#6366F1'},
  {id:'delivered',label:'🎉 Delivered',color:'#059669'},
  {id:'lost',label:'❌ Lost',color:'#EF4444'},
];
const SOURCES=['GMB Call','Google Ads','Meta Ads','Instagram','Facebook','Reference','Walk-in','Other'];
const BOARD_TYPES=['LED Sign Board','Neon Sign','ACP Sign Board','3D Letters','Glow Sign Board','Vinyl Wrap','Flex Banner','Custom Signage'];
const USERS=[{email:'admin@baaniarts.in',password:'baani2024',name:'Gagan / Baani Arts'}];

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const getLeads=()=>{try{return JSON.parse(localStorage.getItem('ba_leads')||'[]')}catch{return[]}};
const saveLeads=l=>localStorage.setItem('ba_leads',JSON.stringify(l));
const getSession=()=>localStorage.getItem('ba_sess');
const setSession=e=>localStorage.setItem('ba_sess',e);
const clearSession=()=>localStorage.removeItem('ba_sess');

let leads=[];
let editingId=null;
let editingPhotos=[];
let currentTab='dashboard';

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().split('T')[0];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const fmtDate=d=>d?new Date(d+' 00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}):'—';
const fmtMoney=v=>v?'₹'+Number(v).toLocaleString('en-IN'):'—';
const isOverdue=d=>d&&d<todayStr();
const isToday=d=>d===todayStr();
const stageInfo=id=>STAGES.find(s=>s.id===id)||STAGES[0];
const getMonthYear=d=>{const dt=new Date(d);return dt.toLocaleDateString('en-IN',{month:'short',year:'numeric'})};

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function doLogin(){
  const e=document.getElementById('login-email').value.trim();
  const p=document.getElementById('login-pass').value;
  const u=USERS.find(x=>x.email===e&&x.password===p);
  if(u){setSession(e);document.getElementById('header-user').textContent='👤 '+u.name;showApp();}
  else document.getElementById('login-error').textContent='❌ Email ya password galat hai';
}
document.getElementById('login-pass').addEventListener('keydown',e=>e.key==='Enter'&&doLogin());

function doLogout(){clearSession();location.reload();}

function showApp(){
  leads=getLeads();
  document.getElementById('login-screen').style.display='none';
  const ma=document.getElementById('main-app');
  ma.style.display='flex';ma.style.flexDirection='column';
  renderTab(currentTab);updateBadge();
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+tab));
  currentTab=tab;renderTab(tab);
}
function renderTab(tab){
  if(tab==='dashboard')renderDashboard();
  else if(tab==='pipeline')renderPipeline();
  else if(tab==='followups')renderFollowups();
  else if(tab==='leads')renderLeads();
  else if(tab==='reports')renderReports();
}
function updateBadge(){
  const cnt=leads.filter(l=>!['delivered','lost'].includes(l.stage)&&(isOverdue(l.followUpDate)||isToday(l.followUpDate))).length;
  const b=document.getElementById('fu-badge');
  b.style.display=cnt>0?'inline':'none';b.textContent=cnt;
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard(){
  const total=leads.length;
  const active=leads.filter(l=>!['delivered','lost'].includes(l.stage)).length;
  const delivered=leads.filter(l=>l.stage==='delivered').length;
  const lost=leads.filter(l=>l.stage==='lost').length;
  const overdueN=leads.filter(l=>isOverdue(l.followUpDate)&&!['delivered','lost'].includes(l.stage)).length;
  const todayN=leads.filter(l=>isToday(l.followUpDate)).length;
  const revenue=leads.filter(l=>l.stage==='delivered').reduce((s,l)=>s+(Number(l.quoteAmount)||0),0);
  const pipeVal=leads.filter(l=>!['delivered','lost'].includes(l.stage)).reduce((s,l)=>s+(Number(l.quoteAmount)||0),0);
  const advanceTotal=leads.reduce((s,l)=>s+(Number(l.advancePaid)||0),0);
  const pendingTotal=leads.filter(l=>l.stage!=='delivered').reduce((s,l)=>s+(Number(l.balanceDue)||0),0);

  const srcCnt={};leads.forEach(l=>{srcCnt[l.source]=(srcCnt[l.source]||0)+1});

  const boardCnt={};leads.forEach(l=>{boardCnt[l.boardType]=(boardCnt[l.boardType]||0)+1});
  const topBoard=Object.entries(boardCnt).sort((a,b)=>b[1]-a[1]);

  document.getElementById('page-dashboard').innerHTML=`

    <div class="stat-grid">

      ${statCard('Active',active,'#10B981')}
      ${statCard('Delivered',delivered,'#059669')}
      ${statCard('Aaj Follow-up',todayN,'#F59E0B')}
      ${statCard('Overdue',overdueN,'#EF4444')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${bigStat('💰 Revenue (Delivered)',fmtMoney(revenue),'#10B981')}
      ${bigStat('📊 Pipeline Value',fmtMoney(pipeVal),'#6366F1')}
      ${bigStat('⬆️ Advance Received',fmtMoney(advanceTotal),'#F59E0B')}
      ${bigStat('⏳ Balance Pending',fmtMoney(pendingTotal),'#EF4444')}
    </div>
    <div class="dash-grid">
      <div class="card">
        <div style="font-size:11px;font-weight:800;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.8px">📡 Lead Sources</div>
        ${topSrc.length===0?'<div class="empty-text">Koi data nahi</div>':topSrc.map(([s,c])=>`
          <div class="chart-bar-row">
            <div class="chart-bar-label">${s}</div>
            <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.round(c/maxSrc*100)}%;background:#3B82F6"></div></div>
            <div class="chart-bar-val">${c}</div>
          </div>`).join('')}
      </div>
      <div class="card">
        <div style="font-size:11px;font-weight:800;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.8px">🪧 Board Types</div>
        ${topBoard.length===0?'<div class="empty-text">Koi data nahi</div>':topBoard.map(([b,c])=>`
          <div class="chart-bar-row">
            <div class="chart-bar-label">${b}</div>
            <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.round(c/maxBoard*100)}%;background:#10B981"></div></div>
            <div class="chart-bar-val">${c}</div>
          </div>`).join('')}
      </div>
    </div>`;
}
const statCard=(label,val,color)=>`<div class="stat-card" style="border-left-color:${color}"><div class="stat-num" style="color:${color}">${val}</div><div class="stat-label">${label}</div></div>`;

  if(today.length){html+=`<div class="fu-section-title" style="background:rgba(245,158,11,.1);color:var(--yellow)">🔔 Aaj Ka (${today.length})</div>${today.map(fuCard).join('')}`;}

// ─── ALL LEADS ────────────────────────────────────────────────────────────────

  const filtered=leads.filter(l=>{
    const q=searchQ.toLowerCase();

  const srcOpts=SOURCES.map(s=>`<option ${s===filterSrc?'selected':''}>${s}</option>`).join('');

            <span class="badge" style="background:#3B82F622;color:#3B82F6">${l.source}</span>

            ${bal>0?`<span class="badge" style="background:#EF444422;color:#EF4444">Baaki: ${fmtMoney(bal)}</span>`:''}
            ${isOverdue(l.followUpDate)?'<span class="badge badge-overdue">⚠️ Overdue</span>':''}
            ${isToday(l.followUpDate)?'<span class="badge badge-today">🔔 Aaj</span>':''}

// ─── REPORTS ─────────────────────────────────────────────────────────────────
function renderReports(){
  // Monthly grouping
  const monthly={};
  leads.forEach(l=>{
    const m=getMonthYear(l.createdAt);
    if(!monthly[m])monthly[m]={leads:0,delivered:0,revenue:0,pipeline:0};
    monthly[m].leads++;
    if(l.stage==='delivered'){monthly[m].delivered++;monthly[m].revenue+=(Number(l.quoteAmount)||0);}
    else monthly[m].pipeline+=(Number(l.quoteAmount)||0);
  });
  const months=Object.entries(monthly).reverse();

  // Stage funnel
  const stageCnt=STAGES.map(s=>({...s,cnt:leads.filter(l=>l.stage===s.id).length}));
  const maxStg=Math.max(...stageCnt.map(s=>s.cnt),1);

  document.getElementById('page-reports').innerHTML=`
    <div class="sec-title">📈 Monthly Reports</div>
    ${months.length===0?'<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">Abhi koi data nahi</div></div>':''}
    ${months.length>0?`<div class="card" style="overflow-x:auto">
      <table class="month-table">
        <tr><th>Month</th><th>Leads</th><th>Delivered</th><th>Revenue</th><th>Pipeline</th></tr>
        ${months.map(([m,d])=>`<tr>
          <td>${m}</td><td>${d.leads}</td><td>${d.delivered}</td>
          <td style="color:var(--green)">${fmtMoney(d.revenue)}</td>
          <td style="color:var(--purple)">${fmtMoney(d.pipeline)}</td>
        </tr>`).join('')}
      </table>
    </div>`:''}
    <div class="sec-title" style="margin-top:20px">🔽 Stage Funnel</div>
    <div class="card">
      ${stageCnt.map(s=>`
        <div class="chart-bar-row">
          <div class="chart-bar-label">${s.label}</div>
          <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.round(s.cnt/maxStg*100)}%;background:${s.color}"></div></div>
          <div class="chart-bar-val">${s.cnt}</div>
        </div>`).join('')}
    </div>`;
}

// ─── REPEAT CUSTOMER ─────────────────────────────────────────────────────────
function isRepeat(lead){
  if(!lead.phone)return false;
  return leads.filter(l=>l.phone===lead.phone&&l.id!==lead.id).length>0;
}

// ─── WHATSAPP ────────────────────────────────────────────────────────────────
function openWA(phone,name,boardType){
  const num=phone.replace(/\D/g,'');
  const msg=encodeURIComponent(`Namaste ${name} ji! Main Gagan, Baani Arts se bol raha hoon. Aapne ${boardType} ke baare mein enquiry ki thi. Kya aap abhi baat kar sakte hain?`);
  window.open(`https://wa.me/91${num}?text=${msg}`,'_blank');
}

// ─── SHARE LINK ──────────────────────────────────────────────────────────────
function getShareLink(lead){
  const data={name:lead.name,boardType:lead.boardType,stage:stageInfo(lead.stage).label,updated:fmtDate(lead.updatedAt)};
  const encoded=btoa(encodeURIComponent(JSON.stringify(data)));
  return`${location.origin}${location.pathname}?order=${encoded}`;
}

function openNew(){

function openEdit(id){

function buildForm(l){

        <div><div class="pay-num" style="color:var(--yellow)" id="ps-adv">${fmtMoney(l.advancePaid)}</div><div class="pay-label">Advance</div></div>
        <div><div class="pay-num" style="color:var(--red)" id="ps-bal">${fmtMoney(l.balanceDue)}</div><div class="pay-label">Balance</div></div>

function updatePaySummary(){
  const adv=Number(document.getElementById('f-advance')?.value)||0;
  const quot=Number(document.getElementById('f-quote')?.value)||0;
  const bal=quot-adv;
  const e=id=>document.getElementById(id);
  if(e('ps-total'))e('ps-total').textContent=fmtMoney(quot);
  if(e('ps-adv'))e('ps-adv').textContent=fmtMoney(adv);
  if(e('ps-bal')){e('ps-bal').textContent=fmtMoney(Math.max(0,bal));
    if(e('f-balance')&&!e('f-balance').value)e('f-balance').value=Math.max(0,bal)||'';
  }
}

  const files=[...input.files];

    r.readAsDataURL(f);

}

function saveLead(){

  const phone=document.getElementById('f-phone').value.trim();
  if(!name){showToast('❌ Naam daalna zaroori hai!');return;}
  if(!phone){showToast('❌ Phone number daalna zaroori hai!');return;}

  const now=new Date().toISOString();
  const existing=editingId?leads.find(l=>l.id===editingId):null;
  const lead={
    id:editingId||uid(),
    name,phone,
    source:document.getElementById('f-source').value,
    boardType:document.getElementById('f-board').value,
    stage:document.getElementById('f-stage').value,
    quoteAmount:document.getElementById('f-quote').value,
    advancePaid:document.getElementById('f-advance').value,
    balanceDue:document.getElementById('f-balance').value,
    followUpDate:document.getElementById('f-fudate').value,
    address:document.getElementById('f-addr').value,
    notes:document.getElementById('f-notes').value,
    items:editItems.filter(it=>it.desc||it.amount),
    photos:editingPhotos,
    createdAt:existing?existing.createdAt:now,
    updatedAt:now,
  };
  if(editingId){leads=leads.map(l=>l.id===editingId?lead:l);}
  else leads=[lead,...leads];
  saveLeads(leads);closeModal();updateBadge();renderTab(currentTab);
  showToast(editingId?'✅ Lead update ho gayi!':'✅ Naya lead save ho gaya!');
}

function deleteLead(id){
  if(!confirm('Yeh lead delete karein?'))return;
  leads=leads.filter(l=>l.id!==id);saveLeads(leads);closeModal();updateBadge();renderTab(currentTab);
  showToast('🗑️ Lead delete ho gayi');
}

// ─── SHARE ───────────────────────────────────────────────────────────────────
function copyShareLink(id){
  const l=leads.find(x=>x.id===id);if(!l)return;
  navigator.clipboard.writeText(getShareLink(l)).then(()=>showToast('📋 Link copy ho gayi!'));
}
function shareOnWA(id){
  const l=leads.find(x=>x.id===id);if(!l)return;
  const link=getShareLink(l);
  const msg=encodeURIComponent(`Namaste ${l.name} ji! Aapka ${l.boardType} order ka status dekh sakte hain yahan:\n${link}`);
  window.open(`https://wa.me/91${l.phone.replace(/\D/g,'')}?text=${msg}`,'_blank');
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
